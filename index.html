<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOM-IRM Training</title>

  <!-- jsPsych core -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>

  <!-- plugin ufficiali -->
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-video-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>

  <!-- plugin locali -->
  <script src="plugins/plugin-fullscreen.js"></script>

  <style>
  :root {
    --movieBG: #549FFF;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: var(--movieBG);
  }

  body {
    font-family: Arial, sans-serif;
  }

  body.jspsych-display-element {
    width: 100vw;
    height: 100vh;
    min-height: 100vh;
    margin: 0 !important;
    padding: 0 !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    background: var(--movieBG);
  }

  #jspsych-content {
    width: 100%;
    height: 100%;
    position: relative !important;
    background: var(--movieBG);
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }

  .jspsych-content-wrapper {
    width: 100%;
    height: 100%;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }

  .jspsych-content {
    width: 100%;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
  }

  .jspsych-btn {
    display: block !important;
    margin: 20px auto 0 auto !important;
    text-align: center;
  }

  .mmo-form {
    box-sizing: border-box;
    width: min(90vw, 640px);
    text-align: center;
    background: rgba(255,255,255,0.85);
    padding: 22px 26px;
    border-radius: 16px;
    margin: 0 auto;
  }

  .mmo-form h1 {
    margin: 0 0 6px 0;
    font-size: clamp(28px, 4vw, 48px);
  }

  .mmo-form p {
    margin: 10px 0;
    font-size: clamp(18px, 2.2vw, 30px);
  }

  .mmo-form input {
    font-size: clamp(18px, 2vw, 24px);
    padding: 8px 12px;
    width: min(300px, 70vw);
    text-align: center;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.25);
    outline: none;
    box-sizing: border-box;
  }

  .mmo-hint {
    margin-top: 18px;
    font-weight: 700;
    font-size: clamp(16px, 1.8vw, 22px);
  }
</style>
</head>

<body>
  <script src="plugins/jspsych-video-audio-keyboard-response.js"></script>
  <script src="main.js"></script>
</body>
</html>
